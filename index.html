<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Fernando Araujo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --fondo: #f4f7f6;
            --texto: #2d3436;
            --blanco: #ffffff;
            /* Colores basados en tus capturas */
            --color-campesino: #00965e;
            --color-frances: #2c3e50;
            --color-canilla: #e74c3c;
            --color-pinita: #f39c12;
            --color-hamburguesa: #96715f;
            --color-torta: #8e44ad;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--fondo);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 15px;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
        }

        header {
            text-align: center;
            padding: 25px 0;
        }

        header h1 { 
            margin: 0; 
            font-size: 1.4rem; 
            color: var(--texto);
            font-weight: 800;
            text-transform: uppercase;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .menu-card {
            background: var(--blanco);
            border-radius: 20px;
            padding: 20px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.2s;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .menu-card:active {
            transform: scale(0.95);
        }

        .icon-circle {
            width: 55px;
            height: 55px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 1.4rem;
            color: white;
        }

        .menu-card span {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--texto);
            text-transform: uppercase;
        }

        /* Asignación de colores a iconos */
        .bg-campesino { background: var(--color-campesino); }
        .bg-frances { background: var(--color-frances); }
        .bg-canilla { background: var(--color-canilla); }
        .bg-pinita { background: var(--color-pinita); }
        .bg-hamburguesa { background: var(--color-hamburguesa); }
        .bg-torta { background: var(--color-torta); }

    </style>
</head>
<body>

<div class="app-container">
    <header>
        <p style="margin:0; font-size:0.6rem; font-weight:bold; color:#a0aec0; letter-spacing:1px;">GESTIÓN PANADERÍA</p>
        <h1>FERNANDO ARAUJO</h1>
    </header>

    <div class="menu-grid">
        <a href="https://loep1039.github.io/Pan_Campesino/" class="menu-card">
            <div class="icon-circle bg-campesino"><i class="fas fa-leaf"></i></div>
            <span>Campesino</span>
        </a>

        <a href="https://loep1039.github.io/Pan_Frances/" class="menu-card">
            <div class="icon-circle bg-frances"><i class="fas fa-bread-slice"></i></div>
            <span>Francés</span>
        </a>

        <a href="https://loep1039.github.io/Pan_Canilla/" class="menu-card">
            <div class="icon-circle bg-canilla"><i class="fas fa-arrows-alt-v"></i></div>
            <span>Canilla</span>
        </a>

        <a href="https://loep1039.github.io/Pan_Pinita/" class="menu-card">
            <div class="icon-circle bg-pinita"><i class="fas fa-cookie"></i></div>
            <span>Piñita</span>
        </a>

        <a href="https://loep1039.github.io/Pan_Hamburguesa/" class="menu-card">
            <div class="icon-circle bg-hamburguesa"><i class="fas fa-hamburger"></i></div>
            <span>Hamburguesa</span>
        </a>

        <a href="https://loep1039.github.io/Torta_De_Naranja/" class="menu-card">
            <div class="icon-circle bg-torta"><i class="fas fa-birthday-cake"></i></div>
            <span>Torta Naranja</span>
        </a>
    </div>

    <p style="text-align:center; color:#b2bec3; font-size:0.7rem; margin-top:30px;">
        Seleccione un producto para calcular receta
    </p>
</div>

</body>
</html>
