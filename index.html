<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión - Fernando Araujo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --fondo: #f4f7f6;
            --texto: #2d3436;
            --blanco: #ffffff;
            --gris-claro: #edf2f7;
            /* Colores de identidad */
            --color-campesino: #00965e;
            --color-frances: #2c3e50;
            --color-pinita: #f39c12;
            --color-torta: #8e44ad;
            --color-canilla: #e74c3c;
            --color-hamburguesa: #96715f;
            --color-insumos: #34495e;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #e2e8f0;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 15px;
        }

        .app-container { width: 100%; max-width: 450px; background: var(--blanco); border-radius: 30px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.1); min-height: 90vh; position: relative; }

        /* VISTAS */
        .view { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER */
        header { text-align: center; padding: 20px 0; }
        header p { margin: 0; font-size: 0.65rem; letter-spacing: 2px; color: #636e72; text-transform: uppercase; font-weight: bold; }
        header h1 { margin: 5px 0; font-size: 1.3rem; color: var(--texto); font-weight: 800; }

        /* MENÚ PRINCIPAL */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .menu-card { background: var(--blanco); border-radius: 20px; padding: 20px; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; }
        .menu-card:active { transform: scale(0.95); background: #f8fafc; }
        .icon-circle { width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; font-size: 1.2rem; color: white; }
        .menu-card span { font-size: 0.75rem; font-weight: 700; color: var(--texto); text-transform: uppercase; }

        /* CALCULADORA */
        .recipe-header { color: white; padding: 20px; border-radius: 20px; text-align: center; position: relative; margin-bottom: 20px; }
        .btn-back { position: absolute; left: 20px; top: 25px; color: white; cursor: pointer; font-size: 1.2rem; }
        
        .summary-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--gris-claro); padding: 15px; border-radius: 15px; text-align: center; }
        .stat-card.main { grid-column: 1 / -1; background: #fffbeb; border: 1px solid #fef3c7; }
