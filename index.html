<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Fernando Araujo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --fondo: #f4f7f6;
            --texto: #2d3436;
            --blanco: #ffffff;
            /* Colores de identidad por producto */
            --color-campesino: #00965e;  /* Verde */
            --color-frances: #2c3e50;    /* Azul Oscuro */
            --color-pinita: #f39c12;     /* Naranja */
            --color-torta: #8e44ad;      /* Púrpura */
            --color-canilla: #e74c3c;    /* Rojo */
            --color-hamburguesa: #96715f; /* Café */
            --color-insumos: #34495e;    /* Gris Azulado para ajustes */
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--fondo);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
        }

        header {
            text-align: center;
            padding: 30px 0;
        }

        header p { 
            margin: 0; 
            font-size: 0.7rem; 
            letter-spacing: 2px; 
            color: #636e72;
            text-transform: uppercase;
            font-weight: bold;
        }

        header h1 { 
            margin: 5px 0; 
            font-size: 1.4rem; 
            color: var(--texto);
            font-weight: 800;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .menu-card {
            background: var(--blanco);
            border-radius: 20px;
            padding: 20px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .icon-circle {
            width: 55px;
            height: 55px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 1.3rem;
            color: white;
        }

        .menu-card span {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--texto);
            text-align: center;
        }

        /* Botón de Insumos Especial */
        .full-width-btn {
            background: var(--blanco);
            border-radius: 20px;
            padding: 18px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 2px solid #dfe6e9;
            transition: all 0.2s;
        }

        .full-width-btn:active { transform: scale(0.98); }

        .full-width-btn i {
            font-size: 1.2rem;
            color: var(--color-insumos);
        }

        .full-width-btn div b {
            display: block;
            font-size: 0.9rem;
            color: var(--texto);
        }

        .full-width-btn div span {
            font-size: 0.7rem;
            color: #b2bec3;
        }

        /* Colores de los iconos */
        .bg-campesino { background-color: var(--color-campesino); }
        .bg-frances { background-color: var(--color-frances); }
        .bg-pinita { background-color: var(--color-pinita); }
        .bg-torta { background-color: var(--color-torta); }
        .bg-canilla { background-color: var(--color-canilla); }
        .bg-hamburguesa { background-color: var(--color-hamburguesa); }

        .footer-info {
            text-align: center;
            color: #b2bec3;
            font-size: 0.7rem;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <p>Sistema de Gestión</p>
        <h1>FERNANDO ARAUJO</h1>
    </header>

    <nav class="menu-grid">
        <a href="pan_campesino.html" class="menu-card">
            <div class="icon-circle bg-campesino"><i class="fas fa-leaf"></i></div>
            <span>Campesino</span>
        </a>
        <a href="pan_frances.html" class="menu-card">
            <div class="icon-circle bg-frances"><i class="fas fa-bread-slice"></i></div>
            <span>Francés</span>
        </a>
        <a href="pan_pinita.html" class="menu-card">
            <div class="icon-circle bg-pinita"><i class="fas fa-cookie"></i></div>
            <span>Piñita</span>
        </a>
        <a href="torta_naranja.html" class="menu-card">
            <div class="icon-circle bg-torta"><i class="fas fa-birthday-cake"></i></div>
            <span>Torta Naranja</span>
        </a>
        <a href="pan_canilla.html" class="menu-card">
            <div class="icon-circle bg-canilla"><i class="fas fa-arrows-alt-v"></i></div>
            <span>Canilla</span>
        </a>
        <a href="pan_hamburguesa.html" class="menu-card">
            <div class="icon-circle bg-hamburguesa"><i class="fas fa-hamburger"></i></div>
            <span>Hamburguesa</span>
        </a>
    </nav>

    <a href="https://docs.google.com/spreadsheets/d/1FngFQjaqSymrWqXvLNKW2h0iz_sWONCUVpvGDPZF3DM/edit" target="_blank" class="full-width-btn">
        <i class="fas fa-file-invoice-dollar"></i>
        <div>
            <b>Precios de Insumos</b>
            <span>Actualizar costos en Google Sheets</span>
        </div>
        <i class="fas fa-external-link-alt" style="margin-left: auto; font-size: 0.8rem; opacity: 0.3;"></i>
    </a>

    <div class="footer-info">
        &copy; 2026 Fernando Araujo · Panadería Artesanal
    </div>
</div>

</body>
</html>
