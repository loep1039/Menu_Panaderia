<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Fernando Araujo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --fondo: #f4f7f6;
            --texto: #2d3436;
            --blanco: #ffffff;
            --gris-borde: #dfe6e9;
            /* Colores de identidad por producto */
            --color-campesino: #00965e;  /* Verde */
            --color-frances: #2c3e50;    /* Azul Oscuro */
            --color-canilla: #e74c3c;    /* Rojo */
            --color-pinita: #f39c12;     /* Naranja */
            --color-hamburguesa: #96715f; /* Café */
            --color-torta: #8e44ad;      /* Púrpura */
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--fondo);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 450px; /* Ancho ideal para móviles */
        }

        header {
            text-align: center;
            padding: 30px 0;
        }

        header p { 
            margin: 0; 
            font-size: 0.7rem; 
            letter-spacing: 2px; 
            color: #636e72;
            text-transform: uppercase;
            font-weight: bold;
        }

        header h1 { 
            margin: 5px 0; 
            font-size: 1.4rem; 
            color: var(--texto);
            font-weight: 800;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Dos columnas */
            gap: 15px;
            margin-bottom: 25px;
        }

        .menu-card {
            background: var(--blanco);
            border-radius: 20px;
            padding: 20px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            position: relative;
            overflow: hidden;
        }

        /* Borde de color sutil en la parte inferior de cada tarjeta */
        .menu-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
        }

        .menu-card:active {
            transform: scale(0.95);
        }

        .icon-circle {
            width: 55px;
            height: 55px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 1.3rem;
            color: white;
        }

        .menu-card span {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--texto);
            text-align: center;
            text-transform: uppercase;
        }

        /* Colores y bordes específicos */
        .card-campesino::after { background-color: var(--color-campesino); }
        .bg-campesino { background-color: var(--color-campesino); }

        .card-frances::after { background-color: var(--color-frances); }
        .bg-frances { background-color: var(--color-frances); }

        .card-canilla::after { background-color: var(--color-canilla); }
        .bg-canilla { background-color: var(--color-canilla); }

        .card-pinita::after { background-color: var(--color-pinita); }
        .bg-pinita { background-color: var(--color-pinita); }

        .card-hamburguesa::after { background-color: var(--color-hamburguesa); }
        .bg-hamburguesa { background-color: var(--color-hamburguesa); }

        .card-torta::after { background-color: var(--color-torta); }
        .bg-torta { background-color: var(--color-torta); }

        .footer-info {
            text-align: center;
            color: #b2bec3;
            font-size: 0.7rem;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <p>Sistema de Gestión</p>
        <h1>FERNANDO ARAUJO</h1>
    </header>

    <nav class="menu-grid">
        <a href="https://loep1039.github.io/Pan_Campesino/" class="menu-card card-campesino" target="_blank">
            <div class="icon-circle bg-campesino"><i class="fas fa-leaf"></i></div>
            <span>Campesino</span>
        </a>

        <a href="https://loep1039.github.io/Pan_Frances/" class="menu-card card-frances" target="_blank">
            <div class="icon-circle bg-frances"><i class="fas fa-bread-slice"></i></div>
            <span>Francés</span>
        </a>

        <a href="https://loep1039.github.io/Pan_Canilla/" class="menu-card card-canilla" target="_blank">
            <div class="icon-circle bg-canilla"><i class="fas fa-arrows-alt-v"></i></div>
            <span>Canilla</span>
        </a>

        <a href="https://loep1039.github.io/Pan_Pinita/" class="menu-card card-pinita" target="_blank">
            <div class="icon-circle bg-pinita"><i class="fas fa-cookie"></i></div>
            <span>Piñita</span>
        </a>

        <a href="https://loep1039.github.io/Pan_Hamburguesa/" class="menu-card card-hamburguesa" target="_blank">
            <div class="icon-circle bg-hamburguesa"><i class="fas fa-hamburger"></i></div>
            <span>Hamburguesa</span>
        </a>

        <a href="https://loep1039.github.io/Torta_De_Naranja/" class="menu-card card-torta" target="_blank">
            <div class="icon-circle bg-torta"><i class="fas fa-birthday-cake"></i></div>
            <span>Torta Naranja</span>
        </a>
    </nav>

    <div class="footer-info">
        &copy; 2026 Fernando Araujo · Panadería Artesanal
    </div>
</div>

</body>
</html>
